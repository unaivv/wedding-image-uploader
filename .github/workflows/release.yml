name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & attach artifacts to release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── Frontend ──────────────────────────────────────────
      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_EVENT_ID: ${{ secrets.VITE_EVENT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Zip frontend dist
        run: zip -r frontend-dist.zip dist/

      # ── Backend ───────────────────────────────────────────
      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Build backend
        working-directory: server
        run: npm run build:prod

      - name: Zip server dist
        run: zip -r server-dist.zip server/dist/

      # ── Upload to release ─────────────────────────────────
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend-dist.zip
            server-dist.zip
