# Configuración temporal para diagnóstico
# Primero necesitamos que funcione HTTP antes de agregar HTTPS

server {
    listen 80;
    server_name backend.unaividal.com;

    # Logs para debug
    access_log /var/log/nginx/backend.access.log;
    error_log /var/log/nginx/backend.error.log;

    # Permitir verificación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri $uri/ =404;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Endpoint para verificar conectividad
    location /test {
        return 200 "Backend HTTP OK";
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    server_name admin.unaividal.com;

    access_log /var/log/nginx/admin.access.log;
    error_log /var/log/nginx/admin.error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri $uri/ =404;
    }

    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /test {
        return 200 "Admin HTTP OK";
        add_header Content-Type text/plain;
    }
}

# Servidor por defecto para capturar tráfico no específico
server {
    listen 80 default_server;
    server_name _;
    
    location /test {
        return 200 "Default server OK";
        add_header Content-Type text/plain;
    }
    
    location / {
        return 404;
    }
}
